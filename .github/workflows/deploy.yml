name: Deploy FiscalizaBR to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm install --legacy-peer-deps
        working-directory: app

      - name: Build React app
        run: npm run build
        working-directory: app

      - name: Install functions dependencies
        run: npm install --legacy-peer-deps
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json
          firebase deploy --project fiscallizapa --non-interactive
          rm /tmp/sa_key.json
