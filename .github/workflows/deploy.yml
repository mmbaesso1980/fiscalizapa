name: Deploy FiscalizaBR to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install app dependencies
        run: npm install --legacy-peer-deps
        working-directory: app

      - name: Build React app
        run: npm run build
        working-directory: app

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Google credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Deploy Hosting only
        run: firebase deploy --only hosting --non-interactive --project=fiscallizapa
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Install functions dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps
                    rm -f package-lock.json
        working-directory: functions

      - name: Deploy Functions + Firestore rules
        run: firebase deploy --only functions,firestore --non-interactive --project=fiscallizapa
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
