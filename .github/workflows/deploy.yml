name: Deploy FiscalizaBR to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install app dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build React app
        run: npm run build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Google credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Deploy Hosting
        run: firebase deploy --only hosting --non-interactive --project=fiscallizapa
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Install functions dependencies
        run: npm install --legacy-peer-deps
        working-directory: functions

      - name: Create .env for Functions
        run: |
          echo "PORTAL_TRANSPARENCIA_API_KEY=${{ secrets.PORTAL_TRANSPARENCIA_API_KEY }}" > .env
          echo "SQLSERVER=${{ secrets.SQLSERVER }}" >> .env
        working-directory: functions

      - name: Deploy Functions + Firestore rules
        run: firebase deploy --only functions,firestore --non-interactive --project=fiscallizapa --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
