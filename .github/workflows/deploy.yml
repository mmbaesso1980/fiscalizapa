name: Deploy FiscalizaBR to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm install --legacy-peer-deps
        working-directory: app

      - name: Build React app
        run: npm run build
        working-directory: app

      - name: Install functions dependencies
        run: npm install --legacy-peer-deps
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Google credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Create GEMINI_KEY secret if not exists
        run: |
          PROJECT_ID=$(cat /tmp/sa.json | python3 -c "import json,sys; print(json.load(sys.stdin)['project_id'])")
          gcloud auth activate-service-account --key-file=/tmp/sa.json
          if ! gcloud secrets describe GEMINI_KEY --project=$PROJECT_ID 2>/dev/null; then
            echo -n "placeholder" | gcloud secrets create GEMINI_KEY --project=$PROJECT_ID --data-file=-
            echo "Created GEMINI_KEY secret"
          else
            echo "GEMINI_KEY secret already exists"
          fi

      - name: Deploy to Firebase
        run: firebase deploy --non-interactive --project=fiscallizapa
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
