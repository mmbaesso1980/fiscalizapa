name: Firebase Cleanup (one-time)

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Run Firebase cleanup
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/firebaseCleanup.js

      - name: Fix master account
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/fixMasterAccount.js
