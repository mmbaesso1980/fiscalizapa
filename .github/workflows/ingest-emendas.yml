name: Ingest Emendas v4

on:
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd functions && npm install

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa-key.json

      # NODE_PATH: o script está em engines/scripts; o Node resolve pacotes a partir daí,
      # então apontamos para as dependências já instaladas em functions/.
      - name: Run emendas ingestion v4
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
          NODE_PATH: ${{ github.workspace }}/functions/node_modules
        run: node engines/scripts/run-ingest-emendas-v4.js
